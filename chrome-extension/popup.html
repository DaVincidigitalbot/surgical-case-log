<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: #0B1F3B;
      color: #e0e0e0;
    }
    .header {
      background: linear-gradient(135deg, #0B1F3B, #1a2744);
      padding: 16px 20px;
      border-bottom: 1px solid #2a3a5c;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 2px;
    }
    .header p {
      font-size: 11px;
      color: #888;
    }
    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #2EA8FF, #3FE0C5);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      color: #0B1F3B;
    }
    .content {
      padding: 16px 20px;
    }
    .status-bar {
      background: #1a2744;
      border: 1px solid #2a3a5c;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.connected { background: #3FE0C5; }
    .status-dot.disconnected { background: #ff4d4d; }
    .status-dot.loading { background: #FFD700; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .status-text { font-size: 13px; }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      margin-bottom: 8px;
    }

    .case-count {
      text-align: center;
      padding: 20px;
      margin-bottom: 14px;
    }
    .case-count .number {
      font-size: 42px;
      font-weight: 800;
      color: #2EA8FF;
      line-height: 1;
    }
    .case-count .label {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #2EA8FF, #1e90e8);
      color: white;
    }
    .btn-primary:hover {
      box-shadow: 0 4px 16px rgba(46,168,255,0.4);
      transform: translateY(-1px);
    }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .btn-secondary {
      background: #1a2744;
      color: #2EA8FF;
      border: 1px solid #2a3a5c;
    }
    .btn-secondary:hover {
      background: #243656;
    }

    .case-list {
      max-height: 200px;
      overflow-y: auto;
      margin-bottom: 14px;
    }
    .case-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .case-item:hover { background: #1a2744; }
    .case-item input[type="checkbox"] {
      accent-color: #2EA8FF;
    }
    .case-item .case-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .case-item .case-date {
      color: #888;
      font-size: 11px;
      flex-shrink: 0;
    }
    .case-item .case-cpt {
      color: #2EA8FF;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      flex-shrink: 0;
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #1a2744;
    }
    .settings-row label { font-size: 13px; }
    .settings-row input {
      background: #0f1729;
      border: 1px solid #2a3a5c;
      color: #e0e0e0;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
      width: 200px;
    }

    .footer {
      padding: 10px 20px;
      border-top: 1px solid #2a3a5c;
      text-align: center;
    }
    .footer a {
      color: #2EA8FF;
      text-decoration: none;
      font-size: 11px;
    }

    .tab-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 14px;
    }
    .tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      background: #1a2744;
      color: #888;
      border: none;
    }
    .tab.active {
      background: #2EA8FF;
      color: white;
    }

    #exportView, #settingsView { display: none; }
    #exportView.active, #settingsView.active { display: block; }

    .select-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .select-bar a {
      color: #2EA8FF;
      text-decoration: none;
      font-size: 12px;
      cursor: pointer;
    }

    .msg {
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 10px;
      display: none;
    }
    .msg.success { background: rgba(63,224,197,0.15); color: #3FE0C5; display: block; }
    .msg.error { background: rgba(255,77,77,0.15); color: #ff4d4d; display: block; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-row">
      <div class="logo-icon">CL</div>
      <div>
        <h1>Clinical Case Log → ACGME</h1>
        <p>Export cases to the ACGME Case Log System</p>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="status-bar">
      <div class="status-dot loading" id="statusDot"></div>
      <div class="status-text" id="statusText">Connecting...</div>
    </div>

    <div class="tab-bar">
      <button class="tab active" data-tab="export" onclick="switchTab('export')">Export Cases</button>
      <button class="tab" data-tab="settings" onclick="switchTab('settings')">Settings</button>
    </div>

    <div id="exportView" class="active">
      <div id="msgBox" class="msg"></div>

      <div class="case-count" id="caseCountSection" style="display:none;">
        <div class="number" id="unexportedCount">0</div>
        <div class="label">cases ready to export to ACGME</div>
      </div>

      <div class="select-bar" id="selectBar" style="display:none;">
        <span class="section-title" style="margin:0;">Select Cases</span>
        <div>
          <a onclick="selectAll()">All</a> · <a onclick="selectNone()">None</a>
        </div>
      </div>

      <div class="case-list" id="caseList"></div>

      <button class="btn btn-primary" id="exportBtn" onclick="exportSelected()" disabled>
        Export Selected to ACGME
      </button>
      <button class="btn btn-secondary" onclick="openACGME()">
        Open ACGME Case Log System ↗
      </button>
    </div>

    <div id="settingsView">
      <div class="section-title">Clinical Case Log Account</div>
      <div class="settings-row">
        <label>API Token</label>
        <input type="password" id="apiToken" placeholder="Paste from app settings">
      </div>
      <div class="settings-row">
        <label>Site / Institution</label>
        <input type="text" id="defaultSite" placeholder="e.g. CaroMont Regional">
      </div>
      <div style="margin-top: 12px;">
        <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
      </div>
    </div>
  </div>

  <div class="footer">
    <a href="https://clinicalcaselog.com" target="_blank">clinicalcaselog.com</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
